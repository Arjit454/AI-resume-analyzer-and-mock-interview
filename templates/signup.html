{% extends "base.html" %}
{% block title %}Sign up — CareerStack{% endblock %}
{% block content %}

<section class="auth-section">
  <div class="auth-blob" data-speed="0.15"></div>

  <div class="auth-card" id="authCard">
    <p class="eyebrow">Get started</p>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Free to use — upload a resume and get your first ATS score in under a minute.</p>

    <form method="POST" action="{{ url_for('auth.signup') }}" class="auth-form" id="signupForm" novalidate>
      <div class="field-group">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" placeholder="Your name"
               value="{{ name or '' }}" required autofocus>
      </div>

      <div class="field-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com"
               value="{{ email or '' }}" required>
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
          <button type="button" class="toggle-visibility" data-target="password">Show</button>
        </div>
      </div>

      <div class="field-group">
        <label for="confirm_password">Confirm password</label>
        <div class="password-wrap">
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Type it again" required minlength="6">
          <button type="button" class="toggle-visibility" data-target="confirm_password">Show</button>
        </div>
        <span class="field-hint" id="matchHint"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-lg auth-submit">Create account</button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
    </p>
  </div>
</section>

{% endblock %}
{% block extra_js %}
<script>
  const pw = document.getElementById("password");
  const cpw = document.getElementById("confirm_password");
  const hint = document.getElementById("matchHint");

  function checkMatch() {
    if (!cpw.value) {
      hint.textContent = "";
      return;
    }
    if (pw.value === cpw.value) {
      hint.textContent = "Passwords match";
      hint.className = "field-hint hint-good";
    } else {
      hint.textContent = "Passwords don't match yet";
      hint.className = "field-hint hint-warn";
    }
  }
  pw.addEventListener("input", checkMatch);
  cpw.addEventListener("input", checkMatch);
</script>
{% endblock %}

{% extends "base.html" %}
{% block title %}Log in — CareerStack{% endblock %}
{% block content %}

<section class="auth-section">
  <div class="auth-blob" data-speed="0.15"></div>

  <div class="auth-card" id="authCard">
    <p class="eyebrow">Welcome back</p>
    <h1 class="auth-title">Log in to your dashboard</h1>
    <p class="auth-sub">Pick up where you left off with your resume score and interview history.</p>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" novalidate>
      <div class="field-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com"
               value="{{ email or '' }}" required autofocus>
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" placeholder="Your password" required minlength="6">
          <button type="button" class="toggle-visibility" data-target="password">Show</button>
        </div>
      </div>

      <div class="field-row">
        <label class="checkbox-label">
          <input type="checkbox" name="remember">
          <span>Remember me</span>
        </label>
        <a href="{{ url_for('auth.forgot_password') }}" class="inline-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-lg auth-submit">Log in</button>
    </form>

    <p class="auth-switch">
      Don't have an account yet? <a href="{{ url_for('auth.signup') }}">Sign up</a>
    </p>
  </div>
</section>

{% endblock %}

{% extends "base.html" %}
{% block title %}Reset password — CareerStack{% endblock %}
{% block content %}

<section class="auth-section">
  <div class="auth-blob" data-speed="0.15"></div>

  <div class="auth-card" id="authCard">
    <p class="eyebrow">Reset password</p>
    <h1 class="auth-title">Forgot your password?</h1>
    <p class="auth-sub">Enter the email on your account and we'll send you a link to reset it.</p>

    <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="auth-form" novalidate>
      <div class="field-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
      </div>

      <button type="submit" class="btn btn-primary btn-lg auth-submit">Send reset link</button>
    </form>

    <p class="auth-switch">
      Remembered it? <a href="{{ url_for('auth.login') }}">Back to log in</a>
    </p>
  </div>
</section>

{% endblock %}
